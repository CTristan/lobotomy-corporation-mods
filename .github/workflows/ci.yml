name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    uses: open-lobotomy/.github/.github/workflows/dotnet-ci.yml@main
    with:
      solution-file: LobotomyCorporationMods.slnx
      private-references-repo: ${{ vars.PRIVATE_REFERENCES_REPO }}
    secrets:
      PRIVATE_REFERENCES_TOKEN: ${{ secrets.PRIVATE_REFERENCES_TOKEN }}

  status:
    name: CI
    needs: [ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check CI result
        run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            exit 1
          fi
