name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    name: CI
    uses: open-lobotomy/.github/.github/workflows/dotnet-ci.yml@1f893503b211588da70add92af5bf8fe6463f3d1 # main
    with:
      private-references-repo: ${{ vars.PRIVATE_REFERENCES_REPO }}
    secrets:
      PRIVATE_REFERENCES_TOKEN: ${{ secrets.PRIVATE_REFERENCES_TOKEN }}
      PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

  status:
    name: CI
    needs: [ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check CI result
        run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            exit 1
          fi
